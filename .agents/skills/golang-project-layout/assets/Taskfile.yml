version: '3'
dotenv: ['.env']

vars:
  BINARY_NAME: myapp
  BUILD_DIR: ./bin
  COVERAGE_FILE: coverage.out
  MAIN_PACKAGE: ./cmd/{{.BINARY_NAME}}

env:
  GOCACHE: '{{.ROOT_DIR}}/.gocache'
  GOMODCACHE: '{{.ROOT_DIR}}/.gomodcache'
  GOLANGCI_LINT_CACHE: '{{.ROOT_DIR}}/.tmp/golangci-lint'
  GOTMPDIR: '{{.ROOT_DIR}}/.tmp'
  TMPDIR: '{{.ROOT_DIR}}/.tmp'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  ensure-cache:
    internal: true
    cmds:
      - mkdir -p .gocache .gomodcache .tmp .tmp/golangci-lint {{.BUILD_DIR}}

  run:
    desc: Build and run
    deps: [ensure-cache, build]
    cmds:
      - '{{.BUILD_DIR}}/{{.BINARY_NAME}}'

  build:
    desc: Build binary
    deps: [ensure-cache]
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || printf dev
      COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || printf none
      BUILD_DATE:
        sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
      LDFLAGS: >-
        -X github.com/username/myapp/internal/vinfo.Version={{.VERSION}}
        -X github.com/username/myapp/internal/vinfo.Commit={{.COMMIT}}
        -X github.com/username/myapp/internal/vinfo.BuildDate={{.BUILD_DATE}}
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN_PACKAGE}}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -f {{.COVERAGE_FILE}} coverage.html
      - rm -rf .gocache .gomodcache .tmp
      - go clean -cache -testcache

  test:
    desc: Run tests
    deps: [ensure-cache]
    cmds:
      - go test -v -race ./...

  test-short:
    desc: Run short tests
    deps: [ensure-cache]
    cmds:
      - go test -v -race -short ./...

  test-coverage:
    desc: Run tests with coverage
    deps: [ensure-cache]
    cmds:
      - go test -v -race -coverprofile={{.COVERAGE_FILE}} -covermode=atomic ./...
      - go tool cover -html={{.COVERAGE_FILE}} -o coverage.html

  lint:
    desc: Run golangci-lint
    deps: [ensure-cache]
    cmds:
      - golangci-lint run

  fmt:
    desc: Format and fix with golangci-lint
    deps: [ensure-cache]
    cmds:
      - golangci-lint run --fix

  deps:
    desc: Download dependencies
    deps: [ensure-cache]
    cmds:
      - go mod download

  tidy:
    desc: Tidy dependencies
    deps: [ensure-cache]
    cmds:
      - go mod tidy

  hooks-install:
    desc: Install git hooks
    cmds:
      - lefthook install

  init:
    desc: Initialize project (interactive rename + deps + hooks)
    cmds:
      - bash scripts/init.sh
      - task: deps
      - task: hooks-install

  ci:
    desc: Run CI checks
    cmds:
      - task: fmt
      - task: lint
      - task: test
      - task: build
